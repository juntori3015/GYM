<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GYM MAP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --floor: #1a1a1a; --wall: #252525;
      --accent: #e63946; --text: #f0f0f0; --muted: #666;
      --card: #1e1e1e; --border: #2a2a2a;
    }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      user-select: none;
    }
    header { text-align: center; padding: 2rem 1rem 0.8rem; }
    header h1 { font-size: 2rem; font-weight: 900; letter-spacing: 6px; color: var(--accent); }
    header p { font-size: 0.9rem; color: var(--muted); margin-top: 0.4rem; letter-spacing: 2px; }
    .hint { text-align: center; font-size: 0.8rem; color: var(--muted); margin: 0.6rem 0; }
    .map-controls { display: flex; justify-content: center; margin-bottom: 0.8rem; }
    .ctrl-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      font-size: 0.8rem; padding: 0.4rem 1.2rem; border-radius: 4px; cursor: pointer;
      font-family: inherit; letter-spacing: 1px; transition: all 0.15s;
    }
    .ctrl-btn:hover { border-color: var(--muted); color: var(--text); }

    /* GYM FLOOR */
    .gym-wrapper { padding: 0 1.5rem 3rem; display: flex; justify-content: center; }
    .gym-floor {
      position: relative; width: 100%; max-width: 900px; aspect-ratio: 4/3;
      background: var(--floor); border: 2px solid var(--wall); border-radius: 8px;
      overflow: hidden;
    }
    .gym-floor::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .zone {
      position: absolute; font-size: 0.58rem; letter-spacing: 3px;
      color: rgba(255,255,255,0.07); font-weight: 900; pointer-events: none;
    }

    /* MACHINE NODE */
    .machine {
      position: absolute; transform: translate(-50%,-50%);
      cursor: grab; touch-action: none;
      display: flex; flex-direction: column; align-items: center;
    }
    .machine.dragging { cursor: grabbing; z-index: 10; }
    .machine.dragging .machine-box {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(230,57,70,0.35);
    }
    .machine-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; display: flex; flex-direction: column; align-items: center;
      gap: 3px; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      transition: border-color 0.15s, transform 0.1s;
    }
    .machine:not(.dragging):hover .machine-box {
      border-color: rgba(230,57,70,0.6); transform: scale(1.05);
    }
    .machine-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
    .machine-icon svg { width: 100%; height: 100%; }
    .machine-label { font-size: 0.75rem; font-weight: 700; white-space: nowrap; color: var(--text); }
    .machine-part  { font-size: 0.62rem; color: var(--accent); white-space: nowrap; }

    /* MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); z-index: 200;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      width: 100%; max-width: 660px; max-height: 90vh; overflow-y: auto;
      animation: up 0.2s ease;
    }
    @keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

    .modal-header {
      background: linear-gradient(135deg,rgba(230,57,70,0.2),rgba(230,57,70,0.04));
      border-bottom: 1px solid var(--border); padding: 1.5rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
      position: sticky; top: 0; z-index: 1;
    }
    .modal-icon   { width: 56px; height: 56px; display: block; margin-bottom: 0.4rem; }
    .modal-icon svg { width: 100%; height: 100%; }
    .modal-name   { font-size: 1.5rem; font-weight: 900; }
    .modal-target { font-size: 0.85rem; color: var(--accent); margin-top: 0.3rem; }
    .close-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
      font-size: 1.2rem; cursor: pointer; padding: 0.3rem 0.7rem; border-radius: 4px;
      line-height: 1; flex-shrink: 0; transition: all 0.15s;
    }
    .close-btn:hover { color: var(--text); border-color: var(--muted); }

    .modal-body {
      padding: 1.5rem; display: grid;
      grid-template-columns: 1fr 200px; gap: 1.5rem; align-items: start;
    }
    @media (max-width: 540px) { .modal-body { grid-template-columns: 1fr; } }

    .section-tag { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 1rem; }
    .steps-list { list-style: none; }
    .steps-list li {
      display: flex; gap: 1rem; padding: 0.8rem 0;
      border-top: 1px solid var(--border); font-size: 1rem; line-height: 1.65; color: #d0d0d0;
    }
    .step-n { color: var(--accent); font-weight: 900; font-size: 0.9rem; flex-shrink: 0; min-width: 18px; padding-top: 2px; }
    .tip-box {
      margin-top: 1.2rem; background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.22); border-radius: 4px;
      padding: 0.9rem 1rem; font-size: 0.88rem; color: #ff9999;
    }
    .tip-box strong { display: block; margin-bottom: 0.3rem; font-size: 0.68rem; letter-spacing: 1px; }

    /* SVG BODY */
    .body-diagrams { display: flex; gap: 0.8rem; justify-content: center; }
    .diagram-wrap  { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .diagram-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); }
    .body-svg { width: 90px; }
    .body-svg .bp { fill: #272727; stroke: #3e3e3e; stroke-width: 0.8; }
    .body-svg .mr { fill: transparent; transition: fill 0.2s; }
    .body-svg .mr.active { fill: rgba(230,57,70,0.78); }
  </style>
</head>
<body>

<header>

  <p>マシンをタップしてトレーニング方法を確認</p>
</header>
<div class="hint">ドラッグしてマシンを自由に移動できます</div>

    <div class="machine" data-key="bench"    style="left:10%;top:22%" data-dl="10" data-dt="22"><div class="machine-box"><span class="machine-icon">🏋️</span><span class="machine-label">ベンチプレス</span><span class="machine-part">胸・三頭筋</span></div></div>
    <div class="machine" data-key="smith"    style="left:27%;top:22%" data-dl="27" data-dt="22"><div class="machine-box"><span class="machine-icon">📐</span><span class="machine-label">スミスマシン</span><span class="machine-part">胸・肩・脚</span></div></div>

    <div class="machine" data-key="chinning" style="left:27%;top:46%" data-dl="27" data-dt="46"><div class="machine-box"><span class="machine-icon">🔝</span><span class="machine-label">懸垂バー</span><span class="machine-part">広背筋・二頭筋</span></div></div>

    <div class="machine" data-key="row"      style="left:73%;top:46%" data-dl="73" data-dt="46"><div class="machine-box"><span class="machine-icon">🚣</span><span class="machine-label">ロウマシン</span><span class="machine-part">広背筋・僧帽筋</span></div></div>
    <div class="machine" data-key="legpress" style="left:57%;top:75%" data-dl="57" data-dt="75"><div class="machine-box"><span class="machine-icon">🦵</span><span class="machine-label">レッグプレス</span><span class="machine-part">大腿四頭筋・臀筋</span></div></div>
    <div class="machine" data-key="legcurl"  style="left:73%;top:75%" data-dl="73" data-dt="75"><div class="machine-box"><span class="machine-icon">🦿</span><span class="machine-label">レッグカール</span><span class="machine-part">ハムストリングス</span></div></div>
    <div class="machine" data-key="legext"   style="left:88%;top:75%" data-dl="88" data-dt="75"><div class="machine-box"><span class="machine-icon">🔩</span><span class="machine-label">レッグエクステンション</span><span class="machine-part">大腿四頭筋</span></div></div>
  </div>
</div>

// ===== DRAG =====
const gymFloor = document.getElementById('gymFloor');
let dragEl = null, dsx, dsy, dsl, dst, moved;

document.querySelectorAll('.machine').forEach(el => {
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragEl = el; dsx = e.clientX; dsy = e.clientY;
    dsl = parseFloat(el.style.left); dst = parseFloat(el.style.top);
    moved = false;
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
  });
  el.addEventListener('pointermove', e => {
    if (dragEl !== el) return;
    const r = gymFloor.getBoundingClientRect();
    if (Math.abs(e.clientX - dsx) > 5 || Math.abs(e.clientY - dsy) > 5) moved = true;
    if (moved) {
      el.style.left = Math.max(6, Math.min(94, dsl + (e.clientX - dsx) / r.width  * 100)) + '%';
      el.style.top  = Math.max(6, Math.min(94, dst + (e.clientY - dsy) / r.height * 100)) + '%';
    }
  });
  el.addEventListener('pointerup', () => {
    if (dragEl !== el) return;
    el.classList.remove('dragging');
    dragEl = null;
    if (!moved) openModal(el.dataset.key);
    else savePos();
    moved = false;
  });
});

function savePos() {
  const p = {};
  document.querySelectorAll('.machine').forEach(el => {
    p[el.dataset.key] = { l: el.style.left, t: el.style.top };
  });
  localStorage.setItem('gymPos', JSON.stringify(p));
}
function loadPos() {
  try {
    const p = JSON.parse(localStorage.getItem('gymPos') || '{}');
    Object.entries(p).forEach(([k, v]) => {
      const el = document.querySelector(`.machine[data-key="${k}"]`);
      if (el) { el.style.left = v.l; el.style.top = v.t; }
    });
  } catch(e) {}
}
function resetPositions() {
  document.querySelectorAll('.machine').forEach(el => {
    el.style.left = el.dataset.dl + '%';
    el.style.top  = el.dataset.dt + '%';
  });
  localStorage.removeItem('gymPos');
}

// ===== MODAL =====
function openModal(key) {
  const d = DATA[key];
  document.getElementById('m-icon').innerHTML   = ICONS[key] || d.icon;
  document.getElementById('m-name').textContent   = d.name;
  document.getElementById('m-target').textContent = d.target;
  document.getElementById('m-steps').innerHTML    = d.steps.map((s, i) =>
    `<li><span class="step-n">${i+1}</span><span>${s}</span></li>`).join('');
  document.getElementById('m-tip-text').textContent = d.tip;
  // muscles
  document.querySelectorAll('.mr').forEach(el => el.classList.remove('active'));
  d.muscles.forEach(m => document.querySelectorAll('.' + m).forEach(el => el.classList.add('active')));
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeBg(e)   { if (e.target.id === 'overlay') closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadPos();
document.querySelectorAll('.machine').forEach(el => {
  const ic = el.querySelector('.machine-icon');
  if (ic && ICONS[el.dataset.key]) ic.innerHTML = ICONS[el.dataset.key];
});
